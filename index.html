    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script>
        let ffmpeg;
        let isLoaded = false;

        async function trimVideoJS(fileBlob, startTime, endTime) {
          if (!ffmpeg) ffmpeg = FFmpeg.createFFmpeg({ log: true });
          if (!isLoaded) {
            await ffmpeg.load();
            isLoaded = true;
          }

          const fileName = 'input.mp4';
          const outputName = 'output.mp4';
          const buffer = await fileBlob.arrayBuffer();

          ffmpeg.FS('writeFile', fileName, new Uint8Array(buffer));

          // Force duration to exactly 10.0000 seconds
          const epsilon = 0.03; // subtract 30 ms to avoid overshoot
          const trimDuration = (endTime - startTime - epsilon).toFixed(4);
<!--          const duration = (endTime - startTime).toFixed(4);-->
<!--          const fixedDuration = Math.min(10.0000, duration).toFixed(4);-->

          await ffmpeg.run(
  '-ss', `${startTime}`,
  '-i', fileName,
  '-to', `${trimDuration}`,
  '-c:v', 'libx264',
  '-preset', 'ultrafast',    // Fastest encoding
  '-crf', '28',             // Lower quality but faster
  '-c:a', 'aac',
  '-b:a', '128k',           // Reduced audio bitrate
  '-movflags', '+faststart', // Optimize for web playback
  '-avoid_negative_ts', 'make_zero',

  outputName
);

          const data = ffmpeg.FS('readFile', outputName);
          const trimmedBlob = new Blob([data.buffer], { type: 'video/mp4' });
          const url = URL.createObjectURL(trimmedBlob);

          return { data, url };
        }

        window.trimVideoJS = trimVideoJS;
    </script>
